<!DOCTYPE html>
<html lang="en">
<head>

  <title>Japan 2026</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f5f0eb;
      color: #2c2c2c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      box-sizing: border-box;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.25rem;
      letter-spacing: 0.05em;
    }
    p.subtitle {
      color: #888;
      margin-bottom: 2.5rem;
      font-style: italic;
    }
    nav {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 420px;
    }
    a.card {
      display: block;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.1rem 1.5rem;
      text-decoration: none;
      color: #2c2c2c;
      font-size: 1.1rem;
      transition: background 0.15s, box-shadow 0.15s;
    }
    a.card:hover {
      background: #fef9f0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    a.card span.label {
      font-weight: bold;
    }
    a.card span.desc {
      display: block;
      font-size: 0.85rem;
      color: #999;
      margin-top: 0.2rem;
    }

</head>

  <nav>
